name: PR Checks

on:
  pull_request:
    branches:
      - main

# Least-privilege default for the GITHUB_TOKEN; these jobs only read the repo.
permissions:
  contents: read

# Cancel superseded in-progress runs when a new commit is pushed to the PR.
concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/appdb?schema=public'
  BETTER_AUTH_SECRET: 'ci-test-secret-not-for-production'
  BETTER_AUTH_URL: 'http://localhost:4173'
  PUBLIC_SENTRY_DSN: ''

jobs:
  lint-test:
    name: Run Prettier, ESLint, and Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Update npm
        run: npm install -g npm@11

      - name: Install Dependencies
        run: npm ci

      - name: Run Prettier
        run: npx prettier --check .

      - name: Run ESLint
        run: npx eslint .

      - name: Run Vitest
        run: npx vitest --run
