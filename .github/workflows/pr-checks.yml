name: PR Checks

on:
  pull_request:
    branches:
      - main

# Least-privilege default for the GITHUB_TOKEN; these jobs only read the repo.
permissions:
  contents: read

env:
  DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/appdb?schema=public'
  BETTER_AUTH_SECRET: 'ci-test-secret-not-for-production'
  BETTER_AUTH_URL: 'http://localhost:4173'
  PUBLIC_SENTRY_DSN: ''
  # Dummy OAuth credentials so BetterAuth can build provider authorize URLs
  # during the e2e tests without contacting the real providers.
  GITHUB_CLIENT_ID: 'ci-github-client-id'
  GITHUB_CLIENT_SECRET: 'ci-github-client-secret'
  GOOGLE_CLIENT_ID: 'ci-google-client-id'
  GOOGLE_CLIENT_SECRET: 'ci-google-client-secret'

jobs:
  lint-test:
    name: Run Prettier, ESLint, and Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Update npm
        run: npm install -g npm@11

      - name: Install Dependencies
        run: npm ci

      - name: Run Prettier
        run: npx prettier --check .

      - name: Run ESLint
        run: npx eslint .

      - name: Run Vitest
        run: npx vitest --run

  e2e:
    name: Run Playwright e2e tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Update npm
        run: npm install -g npm@11

      - name: Install Dependencies
        run: npm ci

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
