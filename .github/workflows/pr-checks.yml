name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint-test:
    name: Run Prettier, ESLint, and Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Update npm
        run: npm install -g npm@11

      - name: Install Dependencies
        run: npm ci

      - name: Run Prettier
        run: npx prettier --check .

      - name: Run ESLint
        run: npx eslint .

      - name: Run Vitest
        run: npx vitest --run
